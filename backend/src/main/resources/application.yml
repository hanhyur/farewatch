spring:
  application:
    name: farewatch

  datasource:
    url: jdbc:h2:mem:farewatch;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false  # H2 프로파일에서는 ddl-auto 사용, Flyway는 docker 프로파일에서 활성화

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

farewatch:
  collection:
    # 수집 주기. 기본 12시간 (43_200_000 ms). SerpApi 무료 250호출/월 기준.
    # 12h × 2노선 × 2출발일 = 8회/일 ≈ 240회/월.
    interval-ms: 43200000
    # 출발일 오프셋 (today + N일). 무료 쿼터를 위해 2개로 제한.
    target-day-offsets: 7,14
