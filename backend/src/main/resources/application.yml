spring:
  application:
    name: farewatch

  datasource:
    url: jdbc:h2:mem:farewatch;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    enabled: false  # H2 프로파일에서는 ddl-auto 사용, Flyway는 docker 프로파일에서 활성화

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html

farewatch:
  collection:
    # 수집 주기. 기본 6시간 (21_600_000 ms). 테스트/로컬에서 오버라이드 가능.
    interval-ms: 21600000
    # 출발일 오프셋 (today + N일). 스케줄러 sweep 마다 이 날짜들에 대해 스냅샷 수집.
    target-day-offsets: 7,14,30
