services:
  postgres:
    image: postgres:16-alpine
    container_name: farewatch-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: farewatch
      POSTGRES_USER: farewatch
      POSTGRES_PASSWORD: farewatch
    volumes:
      - farewatch-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farewatch"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  farewatch-pgdata:
